{% load static %}

<!-- JavaScript files-->
      <script src="{% static 'vendor/jquery/jquery.min.js' %}"></script>
      <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
      <script src="{% static 'vendor/lightbox2/js/lightbox.min.js' %}"></script>
      <script src="{% static 'vendor/nouislider/nouislider.min.js' %}"></script>
      <script src="{% static 'vendor/bootstrap-select/js/bootstrap-select.min.js' %}"></script>
      <script src="{% static 'vendor/owl.carousel2/owl.carousel.min.js' %}"></script>
      <script src="{% static 'vendor/owl.carousel2.thumbs/owl.carousel2.thumbs.min.js' %}"></script>
<script src="{% static 'js/front.js' %}?v=3"></script>
  <script>
  // 1. Price Slider Initialization
  var range = document.getElementById('range');
  if (range) {
    noUiSlider.create(range, {
        range: { 'min': 0, 'max': 2000 },
        step: 5,
        start: [100, 1000],
        margin: 300,
        connect: true,
        direction: 'ltr',
        orientation: 'horizontal',
        behaviour: 'tap-drag',
        tooltips: true,
        format: {
          to: function ( value ) { return '$' + value; },
          from: function ( value ) { return value.replace('$', ''); }
        }
    });
  }

  // 2. Country Dropdown Loader
  $(document).ready(function () {
    const $countrySelect = $("select.country");
    if ($countrySelect.length > 0) {
        $.getJSON('/static/js/countries.json', function (data) {
            $countrySelect.empty();
            $countrySelect.append('<option value="">Select Country</option>');
            $.each(data, function (key, value) {
                var selectOption = `<option value="${value.name}" data-dial-code="${value.dial_code}">${value.name}</option>`;
                $countrySelect.append(selectOption);
            });
        }).fail(function() {
            console.error("Failed to load /static/js/countries.json");
        });
    }
  });

  // 3. SVG Sprite Injector
  function injectSvgSprite(path) {
      var ajax = new XMLHttpRequest();
      ajax.open("GET", path, true);
      ajax.send();
      ajax.onload = function(e) {
          var div = document.createElement("div");
          div.className = 'd-none';
          div.innerHTML = ajax.responseText;
          document.body.insertBefore(div, document.body.childNodes[0]);
      }
  }
  
  // Execute SVG injection
  injectSvgSprite('/static/icons/orion-svg-sprite.svg');
</script>
      <!-- FontAwesome CSS - loading as last, so it doesn't block rendering-->
      <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    </div>
  </body>
</html>
